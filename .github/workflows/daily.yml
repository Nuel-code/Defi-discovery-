name: DeFi Repo Monitor

on:
  schedule:
    # Runs daily at 00:00 UTC (adjust if needed, e.g., '30 5 * * *' for 5:30 AM UTC)
    - cron: '0 0 * * *'
  # Allows manual triggering from GitHub Actions tab
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4 # Use a recent version

      - name: Set up Python environment
        uses: actions/setup-python@v5 # Use a recent version
        with:
          python-version: '3.x' # Or a specific version like '3.9', '3.10', etc.

      - name: Install Python dependencies
        # Your script uses 'requests', which is usually pre-installed on GitHub Actions runners,
        # but it's good practice to explicitly install it.
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run DeFi Repo Bot
        run: python defi_bot.py # Make sure 'defi_bot.py' is the correct name of your script file
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Pass the GitHub PAT securely
          
