name: Daily Web3 Scout

on:
  schedule:
    # Run once a day at 03:00 UTC (adjust if you want a different time)
    - cron: '0 3 * * *'
  workflow_dispatch: {}

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
      GH_PAT:              ${{ secrets.GH_PAT }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run web3 scout bot
        run: |
          # Run the updated script that is present in the repo
          python defi_bot.py

      - name: Commit updated sent_repo_ids (if changed)
        if: always()
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config --global user.name "web3-scout-bot"
          git config --global user.email "web3-scout-bot@users.noreply.github.com"
          git add data/sent_repo_ids.json || true
          if ! git diff --cached --quiet; then
            git commit -m "web3-scout-bot: persist sent_repo_ids (CI)" || true
            git push "https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git" HEAD:main || true
          else
            echo "No changes to commit."
          fi
